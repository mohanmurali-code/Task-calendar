<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Calendar</title>
  <meta name="theme-color" content="#f45d8f">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #f6f7fb;
      --ink: #171717;
      --muted: #70727a;
      --line: #e7e7ec;
      --card: #ffffff;
      --soft: #fafafa;
      --pink: #f45d8f;
      --orange: #ff9d47;
      --violet: #7c4dff;
      --green: #1fa97a;
      --shadow: 0 24px 80px rgba(27, 29, 43, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(244, 93, 143, 0.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(255, 157, 71, 0.16), transparent 28rem),
        var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .topbar,
    .panel,
    .sidebar-card,
    .composer {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark,
    .avatar {
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--pink), var(--violet));
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(244, 93, 143, 0.28);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 19px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 14px;
      flex: 0 0 auto;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn,
    .pill-btn,
    .tab-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .icon-btn {
      width: 42px;
      flex: 0 0 42px;
      font-size: 20px;
    }

    .pill-btn {
      gap: 8px;
      padding: 0 16px;
      font-weight: 750;
      white-space: nowrap;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      border-color: transparent;
      box-shadow: 0 12px 28px rgba(244, 93, 143, 0.3);
    }

    .icon-btn:hover,
    .pill-btn:hover,
    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .panel {
      border-radius: 28px;
      overflow: hidden;
    }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .month-title {
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-width: min(360px, 100%);
    }

    .stat {
      padding: 12px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .stat strong {
      display: block;
      font-size: 20px;
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      padding: 16px 20px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
    }

    .calendar-grid {
      padding: 0 20px 20px;
      touch-action: pan-y;
    }

    .day {
      position: relative;
      min-height: 106px;
      padding: 10px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      text-align: left;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .day:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(27, 29, 43, 0.1);
    }

    .day.is-selected {
      border-color: rgba(244, 93, 143, 0.75);
      box-shadow: inset 0 0 0 2px rgba(244, 93, 143, 0.2), 0 18px 40px rgba(244, 93, 143, 0.18);
    }

    .day.is-today .day-number {
      color: #fff;
      background: linear-gradient(135deg, var(--orange), var(--pink));
    }

    .day-number {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-weight: 850;
    }

    .day-summary {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 10px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pink);
      flex: 0 0 auto;
    }

    .dot.note {
      background: var(--violet);
    }

    .empty {
      min-height: 106px;
    }

    .sidebar {
      display: grid;
      gap: 14px;
      position: sticky;
      top: 18px;
    }

    .sidebar-card,
    .composer {
      border-radius: 24px;
      padding: 16px;
    }

    .selected-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      min-height: 38px;
      font-weight: 800;
    }

    .tab-btn.active {
      color: #fff;
      background: #171717;
      border-color: #171717;
    }

    .composer {
      display: grid;
      gap: 10px;
      box-shadow: none;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .field,
    .textarea,
    .select {
      width: 100%;
      min-height: 42px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
    }

    .textarea {
      min-height: 96px;
      resize: vertical;
    }

    .field:focus,
    .textarea:focus,
    .select:focus {
      border-color: rgba(244, 93, 143, 0.75);
      box-shadow: 0 0 0 4px rgba(244, 93, 143, 0.12);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .feed {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }

    .item-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .check {
      width: 24px;
      height: 24px;
      margin-top: 1px;
      border: 2px solid var(--line);
      border-radius: 50%;
      background: #fff;
    }

    .check.done {
      border-color: var(--green);
      background: var(--green);
      box-shadow: inset 0 0 0 5px #fff;
    }

    .item-title {
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .item-title.done {
      color: var(--muted);
      text-decoration: line-through;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .chip {
      padding: 4px 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-weight: 750;
    }

    .delete {
      width: 30px;
      height: 30px;
      color: var(--muted);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 50%;
      font-weight: 900;
    }

    .empty-state {
      padding: 18px;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 18px;
      text-align: center;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 122px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mobile-dock {
      display: none;
    }

    @media (max-width: 920px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 16px, 1180px);
        padding: 10px 0 84px;
      }

      .topbar,
      .calendar-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar {
        border-radius: 20px;
      }

      .actions {
        width: 100%;
        justify-content: space-between;
      }

      .stats {
        width: 100%;
        min-width: 0;
      }

      .calendar-head,
      .weekdays {
        padding-left: 12px;
        padding-right: 12px;
      }

      .calendar-grid {
        gap: 5px;
        padding: 0 12px 12px;
      }

      .day,
      .empty {
        min-height: 72px;
      }

      .day {
        padding: 7px;
        border-radius: 16px;
      }

      .day-number {
        width: 26px;
        height: 26px;
        font-size: 13px;
      }

      .mini-row {
        font-size: 0;
      }

      .mobile-dock {
        position: fixed;
        left: 50%;
        bottom: 12px;
        z-index: 5;
        display: grid;
        grid-template-columns: repeat(3, 52px);
        gap: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 999px;
        box-shadow: 0 16px 50px rgba(27, 29, 43, 0.18);
        transform: translateX(-50%);
        backdrop-filter: blur(18px);
      }

      .mobile-dock .icon-btn {
        width: 52px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">TC</div>
        <div>
          <h1>Task Calendar</h1>
          <p class="muted">Plan your day, swipe your month, save everything here.</p>
        </div>
      </div>
      <div class="actions">
        <button id="prev" class="icon-btn" aria-label="Previous month">&lt;</button>
        <button id="today" class="pill-btn primary">Today</button>
        <button id="next" class="icon-btn" aria-label="Next month">&gt;</button>
        <div class="avatar" aria-label="Profile">MM</div>
      </div>
    </header>

    <section class="shell">
      <section class="panel" aria-label="Calendar">
        <div class="calendar-head">
          <div>
            <h2 id="monthTitle" class="month-title"></h2>
            <p id="selectedLabel" class="muted"></p>
          </div>
          <div class="stats">
            <div class="stat">
              <strong id="taskCount">0</strong>
              <span class="muted">Tasks</span>
            </div>
            <div class="stat">
              <strong id="doneCount">0</strong>
              <span class="muted">Done</span>
            </div>
            <div class="stat">
              <strong id="noteCount">0</strong>
              <span class="muted">Notes</span>
            </div>
          </div>
        </div>
        <div class="weekdays">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <aside class="sidebar">
        <section class="sidebar-card">
          <div class="selected-head">
            <div>
              <h3 id="dayTitle">Today</h3>
              <p id="daySubtitle" class="muted"></p>
            </div>
            <button id="clearDone" class="pill-btn">Clear done</button>
          </div>

          <div class="tabs">
            <button id="tasksTab" class="tab-btn active">Tasks</button>
            <button id="notesTab" class="tab-btn">Notes</button>
          </div>

          <div class="search-row">
            <input id="searchInput" class="field" type="search" placeholder="Search">
            <select id="filterSelect" class="select" aria-label="Filter tasks">
              <option value="all">All</option>
              <option value="open">Open</option>
              <option value="done">Done</option>
              <option value="high">High</option>
            </select>
          </div>

          <div id="feed" class="feed"></div>
        </section>

        <section class="composer">
          <h3 id="composerTitle">Add task</h3>
          <input id="taskTitle" class="field" type="text" placeholder="Task title">
          <div class="form-row">
            <input id="taskTime" class="field" type="time" aria-label="Task time">
            <select id="taskPriority" class="select" aria-label="Task priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <textarea id="noteText" class="textarea" placeholder="Write a note"></textarea>
          <button id="saveItem" class="pill-btn primary">Add task</button>
        </section>
      </aside>
    </section>
  </main>

  <nav class="mobile-dock" aria-label="Month navigation">
    <button id="dockPrev" class="icon-btn" aria-label="Previous month">&lt;</button>
    <button id="dockToday" class="icon-btn" aria-label="Today">+</button>
    <button id="dockNext" class="icon-btn" aria-label="Next month">&gt;</button>
  </nav>

  <script>
    const storageKey = "task-calendar-v2";
    const today = new Date();
    const state = {
      current: new Date(today.getFullYear(), today.getMonth(), 1),
      selected: toKey(today),
      mode: "tasks",
      items: loadItems(),
      swipeStartX: 0,
      swipeStartY: 0,
      swipeTracking: false
    };

    const els = {
      grid: document.getElementById("calendarGrid"),
      monthTitle: document.getElementById("monthTitle"),
      selectedLabel: document.getElementById("selectedLabel"),
      dayTitle: document.getElementById("dayTitle"),
      daySubtitle: document.getElementById("daySubtitle"),
      taskCount: document.getElementById("taskCount"),
      doneCount: document.getElementById("doneCount"),
      noteCount: document.getElementById("noteCount"),
      tasksTab: document.getElementById("tasksTab"),
      notesTab: document.getElementById("notesTab"),
      feed: document.getElementById("feed"),
      search: document.getElementById("searchInput"),
      filter: document.getElementById("filterSelect"),
      composerTitle: document.getElementById("composerTitle"),
      taskTitle: document.getElementById("taskTitle"),
      taskTime: document.getElementById("taskTime"),
      taskPriority: document.getElementById("taskPriority"),
      noteText: document.getElementById("noteText"),
      saveItem: document.getElementById("saveItem")
    };

    function toKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch (error) {
        return [];
      }
    }

    function saveItems() {
      localStorage.setItem(storageKey, JSON.stringify(state.items));
    }

    function selectedItems(type) {
      return state.items.filter(item => item.date === state.selected && item.type === type);
    }

    function monthItems() {
      const year = state.current.getFullYear();
      const month = state.current.getMonth();
      return state.items.filter(item => {
        const date = fromKey(item.date);
        return date.getFullYear() === year && date.getMonth() === month;
      });
    }

    function formatDate(key, options) {
      return fromKey(key).toLocaleDateString("en", options);
    }

    function changeMonth(offset) {
      state.current.setMonth(state.current.getMonth() + offset);
      render();
    }

    function selectDate(key) {
      state.selected = key;
      const selectedDate = fromKey(key);
      state.current = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      render();
    }

    function renderCalendar() {
      els.grid.innerHTML = "";
      const year = state.current.getFullYear();
      const month = state.current.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayKey = toKey(new Date());

      els.monthTitle.textContent = state.current.toLocaleDateString("en", { month: "long", year: "numeric" });
      els.selectedLabel.textContent = `${formatDate(state.selected, { weekday: "long", month: "short", day: "numeric" })} selected`;

      for (let i = 0; i < firstDay; i += 1) {
        const empty = document.createElement("div");
        empty.className = "empty";
        els.grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const key = toKey(new Date(year, month, day));
        const tasks = state.items.filter(item => item.date === key && item.type === "task");
        const notes = state.items.filter(item => item.date === key && item.type === "note");
        const button = document.createElement("button");
        button.className = ["day", key === todayKey ? "is-today" : "", key === state.selected ? "is-selected" : ""].join(" ");
        button.type = "button";
        button.setAttribute("aria-label", `Select ${key}`);
        button.innerHTML = `
          <span class="day-number">${day}</span>
          <span class="day-summary">
            ${tasks.length ? `<span class="mini-row"><span class="dot"></span>${tasks.length} task${tasks.length > 1 ? "s" : ""}</span>` : ""}
            ${notes.length ? `<span class="mini-row"><span class="dot note"></span>${notes.length} note${notes.length > 1 ? "s" : ""}</span>` : ""}
          </span>
        `;
        button.addEventListener("click", () => selectDate(key));
        els.grid.appendChild(button);
      }
    }

    function renderStats() {
      const items = monthItems();
      const tasks = items.filter(item => item.type === "task");
      els.taskCount.textContent = tasks.length;
      els.doneCount.textContent = tasks.filter(item => item.done).length;
      els.noteCount.textContent = items.filter(item => item.type === "note").length;
    }

    function renderSidebar() {
      const selectedDate = fromKey(state.selected);
      els.dayTitle.textContent = selectedDate.toLocaleDateString("en", { weekday: "long" });
      els.daySubtitle.textContent = selectedDate.toLocaleDateString("en", { month: "long", day: "numeric", year: "numeric" });
      els.tasksTab.classList.toggle("active", state.mode === "tasks");
      els.notesTab.classList.toggle("active", state.mode === "notes");
      els.composerTitle.textContent = state.mode === "tasks" ? "Add task" : "Add note";
      els.saveItem.textContent = state.mode === "tasks" ? "Add task" : "Add note";
      els.taskTitle.style.display = state.mode === "tasks" ? "" : "none";
      els.taskTime.style.display = state.mode === "tasks" ? "" : "none";
      els.taskPriority.style.display = state.mode === "tasks" ? "" : "none";
      els.noteText.placeholder = state.mode === "tasks" ? "Optional details" : "Write a note";
      renderFeed();
    }

    function renderFeed() {
      const query = els.search.value.trim().toLowerCase();
      const filter = els.filter.value;
      let items = selectedItems(state.mode === "tasks" ? "task" : "note");

      if (query) {
        items = items.filter(item => `${item.title || ""} ${item.text || ""}`.toLowerCase().includes(query));
      }

      if (state.mode === "tasks") {
        if (filter === "open") items = items.filter(item => !item.done);
        if (filter === "done") items = items.filter(item => item.done);
        if (filter === "high") items = items.filter(item => item.priority === "high");
        items.sort((a, b) => (a.done - b.done) || (a.time || "").localeCompare(b.time || ""));
      } else {
        items.sort((a, b) => b.createdAt - a.createdAt);
      }

      els.feed.innerHTML = "";
      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = state.mode === "tasks" ? "No tasks for this day." : "No notes for this day.";
        els.feed.appendChild(empty);
        return;
      }

      items.forEach(item => {
        const card = document.createElement("article");
        card.className = "item-card";
        if (item.type === "task") {
          card.innerHTML = `
            <button class="check ${item.done ? "done" : ""}" aria-label="Toggle task"></button>
            <div>
              <div class="item-title ${item.done ? "done" : ""}">${escapeHtml(item.title)}</div>
              ${item.text ? `<p class="muted">${escapeHtml(item.text)}</p>` : ""}
              <div class="meta">
                ${item.time ? `<span class="chip">${item.time}</span>` : ""}
                <span class="chip">${item.priority}</span>
              </div>
            </div>
            <button class="delete" aria-label="Delete task">x</button>
          `;
          card.querySelector(".check").addEventListener("click", () => toggleDone(item.id));
        } else {
          card.innerHTML = `
            <div class="avatar">N</div>
            <div>
              <div class="item-title">Note</div>
              <p class="muted">${escapeHtml(item.text)}</p>
              <div class="meta"><span class="chip">${new Date(item.createdAt).toLocaleTimeString("en", { hour: "2-digit", minute: "2-digit" })}</span></div>
            </div>
            <button class="delete" aria-label="Delete note">x</button>
          `;
        }
        card.querySelector(".delete").addEventListener("click", () => deleteItem(item.id));
        els.feed.appendChild(card);
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function addItem() {
      const title = els.taskTitle.value.trim();
      const text = els.noteText.value.trim();
      if (state.mode === "tasks" && !title) {
        els.taskTitle.focus();
        return;
      }
      if (state.mode === "notes" && !text) {
        els.noteText.focus();
        return;
      }

      state.items.push({
        id: crypto.randomUUID(),
        date: state.selected,
        type: state.mode === "tasks" ? "task" : "note",
        title,
        text,
        time: els.taskTime.value,
        priority: els.taskPriority.value,
        done: false,
        createdAt: Date.now()
      });

      els.taskTitle.value = "";
      els.taskTime.value = "";
      els.taskPriority.value = "normal";
      els.noteText.value = "";
      saveItems();
      render();
    }

    function toggleDone(id) {
      state.items = state.items.map(item => item.id === id ? { ...item, done: !item.done } : item);
      saveItems();
      render();
    }

    function deleteItem(id) {
      state.items = state.items.filter(item => item.id !== id);
      saveItems();
      render();
    }

    function clearDone() {
      state.items = state.items.filter(item => !(item.date === state.selected && item.type === "task" && item.done));
      saveItems();
      render();
    }

    function render() {
      renderCalendar();
      renderStats();
      renderSidebar();
    }

    document.getElementById("prev").addEventListener("click", () => changeMonth(-1));
    document.getElementById("next").addEventListener("click", () => changeMonth(1));
    document.getElementById("today").addEventListener("click", () => selectDate(toKey(new Date())));
    document.getElementById("dockPrev").addEventListener("click", () => changeMonth(-1));
    document.getElementById("dockNext").addEventListener("click", () => changeMonth(1));
    document.getElementById("dockToday").addEventListener("click", () => selectDate(toKey(new Date())));
    document.getElementById("clearDone").addEventListener("click", clearDone);
    els.tasksTab.addEventListener("click", () => { state.mode = "tasks"; render(); });
    els.notesTab.addEventListener("click", () => { state.mode = "notes"; render(); });
    els.search.addEventListener("input", renderFeed);
    els.filter.addEventListener("change", renderFeed);
    els.saveItem.addEventListener("click", addItem);
    els.taskTitle.addEventListener("keydown", event => {
      if (event.key === "Enter") addItem();
    });

    els.grid.addEventListener("pointerdown", event => {
      state.swipeStartX = event.clientX;
      state.swipeStartY = event.clientY;
      state.swipeTracking = true;
    });

    els.grid.addEventListener("pointerup", event => {
      if (!state.swipeTracking) return;
      state.swipeTracking = false;
      const dx = event.clientX - state.swipeStartX;
      const dy = event.clientY - state.swipeStartY;
      if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        changeMonth(dx < 0 ? 1 : -1);
      }
    });

    els.grid.addEventListener("pointercancel", () => {
      state.swipeTracking = false;
    });

    render();

    if ("serviceWorker" in navigator) {
      const swCode = "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{});";
      const blob = new Blob([swCode], { type: "text/javascript" });
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    const manifest = {
      name: "Task Calendar",
      short_name: "Calendar",
      start_url: ".",
      display: "standalone",
      background_color: "#f6f7fb",
      theme_color: "#f45d8f",
      icons: []
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(manifestBlob);
  </script>
</body>
</html>
